<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>디자인기획팀 대시보드</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body data-page="home">
  <div class="page-shell">
    <header class="hero-card">
      <div class="hero-chip">Workspace</div>
      <h1>디자인기획팀 대시보드</h1>
      <p class="hero-subtitle">팀별 과업 수행 현황 및 프로젝트 계획을 한눈에 파악하세요.</p>

      <div class="hero-actions">
        <div class="segmented" role="tablist" aria-label="보기 모드">
          <button id="view-project-btn" class="segmented__btn is-active" type="button">프로젝트 보기</button>
          <button id="view-member-btn" class="segmented__btn" type="button">팀원별 보기</button>
        </div>

        <div class="upload-actions">
          <label class="button button--ghost" for="csv-upload-previous">이전 주차 CSV</label>
          <input type="file" id="csv-upload-previous" accept=".csv" hidden />
          <label class="button button--primary" for="csv-upload-current">이번 주차 CSV</label>
          <input type="file" id="csv-upload-current" accept=".csv" hidden />
        </div>
      </div>
    </header>

    <section class="stats-grid" id="summary-stats"></section>

    <main>
      <section id="project-view" class="cells-grid"></section>
      <section id="member-view" class="stack hidden"></section>
    </main>
  </div>

  <div class="toast" id="toast"></div>

  <script type="module" src="js/home.js"></script>
</body>
</html>
